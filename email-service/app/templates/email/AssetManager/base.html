<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Manager Notification</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; }
        .header { background: #0a0a0a; color: #ffffff; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: 1px; }
        .content { padding: 30px; }
        .footer { background: #f5f5f0; padding: 20px; text-align: center; border-top: 1px solid #e8e8e3; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: #0a0a0a; color: #ffffff; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 12px; border: 1px solid #e8e8e3; font-size: 15px; font-weight: 500; color: #1a1a1a; }
        tr:nth-child(even) { background: #f9f9f7; }
        tr:nth-child(odd) { background: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>{% block header %}ASSET MANAGER{% endblock %}</h1></div>
        <div class="content">{% block content %}{% endblock %}</div>
        <div class="footer">
            <p style="margin: 0; font-weight: 600; font-size: 13px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 1px;">Asset Manager</p>
            <p style="margin: 5px 0 0 0; font-size: 11px; color: #6b6b6b;">Automated notification. Do not reply.</p>
        </div>
    </div>
</body>
</html>
